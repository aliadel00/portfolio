<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.8" flood-opacity="0.22" />
    </filter>
    <filter id="gl" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="1.8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="rim" cx="32%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="42%" stop-color="#a8a3b8" stop-opacity="1" />
      <stop offset="100%" stop-color="#dcd8e8" stop-opacity="1" />
    </radialGradient>
    <linearGradient id="rimDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="handleGrad" gradientUnits="userSpaceOnUse" x1="72" y1="66" x2="90" y2="88">
      <stop offset="0%" stop-color="#6b6778" />
      <stop offset="35%" stop-color="#3d8a82" />
      <stop offset="72%" stop-color="#9e9aae" />
      <stop offset="100%" stop-color="#4a4658" />
    </linearGradient>
    <linearGradient id="handleShine" gradientUnits="userSpaceOnUse" x1="74" y1="64" x2="82" y2="78">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65" />
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="spec" gradientUnits="userSpaceOnUse" x1="38" y1="28" x2="52" y2="42">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <g filter="url(#sh)">
    <path d="M 73 69 L 89 87" stroke="url(#handleGrad)" stroke-width="6.2" stroke-linecap="round" />
    <path d="M 73 69 L 89 87" stroke="url(#handleShine)" stroke-width="2.2" stroke-linecap="round" opacity="0.85" />
    <circle cx="71.2" cy="67.4" r="3.4" fill="url(#rim)" opacity="0.92" />
    <circle cx="71.2" cy="67.4" r="3.4" stroke="#000000" stroke-opacity="0.22" stroke-width="0.45" opacity="0.5" />
  </g>
  <circle cx="50" cy="46" r="29.6" stroke="url(#rim)" stroke-width="3.6" filter="url(#gl)" />
  <circle cx="50" cy="46" r="28.15" stroke="#000000" stroke-opacity="0.2" stroke-width="0.85" opacity="0.65" />
  <circle cx="50" cy="46" r="29.9" stroke="#ffffff" stroke-opacity="0.55" stroke-width="0.55" opacity="0.5" />
  <path
    d="M 23.7 36.4 A 28 28 0 0 1 36 21.8"
    stroke="url(#spec)"
    stroke-width="2.4"
    stroke-linecap="round"
    opacity="0.55"
  />
  <circle cx="50" cy="46" r="26.35" stroke="url(#rimDark)" stroke-width="1.2" opacity="0.35" />
</svg>

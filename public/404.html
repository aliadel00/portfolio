<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - Ali Abolwafa Portfolio</title>
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://aliadel00.github.io/portfolio/" />
    <style>
      :root {
        --bg-deep: #0a0b12;
        --bg-elevated: #121522;
        --fg: #eef2ff;
        --fg-muted: #aeb7d4;
        --accent-1: #7aa2ff;
        --accent-2: #9d7bff;
        --border-soft: color-mix(in oklab, var(--accent-2) 16%, transparent);
        --shadow-soft: 0 24px 48px color-mix(in oklab, black 45%, transparent);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg-deep: #f5f8ff;
          --bg-elevated: #ffffff;
          --fg: #14182b;
          --fg-muted: #5f6888;
          --accent-1: #2d6bff;
          --accent-2: #6a3dff;
          --border-soft: color-mix(in oklab, var(--accent-2) 20%, #e7ebff);
          --shadow-soft: 0 24px 48px color-mix(in oklab, #6b7bd3 17%, transparent);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "DM Sans", "Segoe UI", sans-serif;
        color: var(--fg);
        background:
          radial-gradient(1200px 560px at -10% -20%, color-mix(in oklab, var(--accent-2) 20%, transparent), transparent 60%),
          radial-gradient(950px 520px at 110% 120%, color-mix(in oklab, var(--accent-1) 24%, transparent), transparent 65%),
          var(--bg-deep);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(640px, 100%);
        border-radius: 28px;
        padding: 32px;
        border: 1px solid var(--border-soft);
        background:
          linear-gradient(165deg, color-mix(in oklab, var(--bg-elevated) 88%, transparent), color-mix(in oklab, var(--bg-elevated) 94%, black 4%)),
          url("/portfolio/textures/film-grain.svg");
        box-shadow: var(--shadow-soft);
        backdrop-filter: blur(10px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        text-decoration: none;
        color: inherit;
      }

      .brand img {
        width: 32px;
        height: 32px;
      }

      .brand span {
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--fg-muted);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.06;
      }

      p {
        margin: 14px 0 0;
        color: var(--fg-muted);
        font-size: 1.03rem;
        line-height: 1.6;
        max-width: 52ch;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 26px;
      }

      .btn {
        border-radius: 999px;
        border: 1px solid transparent;
        padding: 11px 16px;
        font-size: 0.93rem;
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.18s ease, background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: linear-gradient(120deg, var(--accent-1), var(--accent-2));
        color: #fff;
      }

      .btn-secondary {
        border-color: color-mix(in oklab, var(--accent-2) 28%, transparent);
        color: var(--fg);
        background: color-mix(in oklab, var(--bg-elevated) 76%, transparent);
      }

      .meta {
        margin-top: 18px;
        font-size: 0.84rem;
        color: color-mix(in oklab, var(--fg-muted) 86%, transparent);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <a class="brand" href="/portfolio/">
        <img src="/portfolio/logos/site-mark-dark.svg" alt="" aria-hidden="true" />
        <span>Ali Abolwafa</span>
      </a>
      <h1>404 - This page doesn't exist.</h1>
      <p>
        The URL may be outdated or mistyped. You can return to the portfolio home and continue browsing sections normally.
      </p>
      <div class="actions">
        <a class="btn btn-primary" href="/portfolio/">Go to Home</a>
        <a class="btn btn-secondary" href="https://www.linkedin.com/in/ali-abolwafa-93b1161b1/">Contact on LinkedIn</a>
      </div>
      <p class="meta">Auto-redirecting to <strong>/portfolio/</strong> in 5 seconds...</p>
    </main>

    <script>
      window.setTimeout(function () {
        window.location.replace('/portfolio/')
      }, 5000)
    </script>
  </body>
</html>

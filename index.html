<!doctype html>
<html lang="en">
  <head>
    <!-- Theme key must match src/theme/themeStorage.ts THEME_STORAGE_KEY; only allow light|dark (no DOM injection). -->
    <script>
      (function () {
        var theme = 'dark'
        try {
          var t = localStorage.getItem('portfolio-theme')
          if (t === 'light' || t === 'dark') theme = t
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', theme)
        var base = '%BASE_PATH%'
        var mark = theme === 'light' ? 'site-mark-light.svg' : 'site-mark-dark.svg'
        var link = document.createElement('link')
        link.rel = 'preload'
        link.as = 'image'
        link.href = base + 'logos/' + mark
        document.head.appendChild(link)
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:"
    />
    <!-- Filled from src/data/siteContent.json at build (see vite.config.ts). Override URL with VITE_SITE_URL in .env.production -->
    <meta name="description" content="%SITE_META_DESCRIPTION%" />
    <meta name="theme-color" content="%SITE_THEME_COLOR%" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="%SITE_OG_TITLE%" />
    <meta property="og:description" content="%SITE_OG_DESCRIPTION%" />
    <meta property="og:url" content="%SITE_OG_URL%" />
    <meta property="og:locale" content="%SITE_OG_LOCALE%" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_TWITTER_TITLE%" />
    <meta name="twitter:description" content="%SITE_TWITTER_DESCRIPTION%" />

    <link rel="icon" type="image/svg+xml" href="%BASE_PATH%favicon.svg" />
    <link rel="canonical" href="%SITE_CANONICAL_URL%" />

    <!-- Self-hosted variable fonts are declared in src/fonts.css. -->

    <!-- Masthead mark: only the active theme is preloaded (see inline script above). -->

    <title>%SITE_TITLE%</title>
    <script type="application/ld+json">%SITE_JSON_LD%</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

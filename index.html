<!doctype html>
<html lang="en">
  <head>
    <!-- Theme key must match src/theme/themeStorage.ts THEME_STORAGE_KEY; only allow light|dark (no DOM injection). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('portfolio-theme')
          if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t)
          else document.documentElement.setAttribute('data-theme', 'dark')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Filled from src/data/siteContent.json at build (see vite.config.ts). Override URL with VITE_SITE_URL in .env.production -->
    <meta name="description" content="%SITE_META_DESCRIPTION%" />
    <meta name="theme-color" content="%SITE_THEME_COLOR%" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="%SITE_OG_TITLE%" />
    <meta property="og:description" content="%SITE_OG_DESCRIPTION%" />
    <meta property="og:url" content="%SITE_OG_URL%" />
    <meta property="og:locale" content="%SITE_OG_LOCALE%" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_TWITTER_TITLE%" />
    <meta name="twitter:description" content="%SITE_TWITTER_DESCRIPTION%" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="%SITE_CANONICAL_URL%" />

    <!-- Self-hosted variable fonts (see src/fonts.css + scripts/copy-fonts.mjs) -->
    <link
      rel="preload"
      href="/fonts/dm-sans-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/syne-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Masthead logo (LCP on mobile) — both themes; files are tiny SVGs -->
    <link rel="preload" as="image" href="/logos/site-mark-dark.svg" />
    <link rel="preload" as="image" href="/logos/site-mark-light.svg" />

    <title>%SITE_TITLE%</title>
    <script type="application/ld+json">%SITE_JSON_LD%</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

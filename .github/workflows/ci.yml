name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
        env:
          CI: true
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
        env:
          CI: true
      - run: npm run test:security
